<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声認識による文字起こし（数値のみ）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <!-- 初期テーマ設定 (チラつき防止) -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <style>
        /* スムーズなハイライト移行のためのトランジション */
        tr { transition: background-color 0.2s ease; }
        /* スピナーアニメーション */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(225, 29, 72, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }
        .mic-active { animation: pulse-ring 2s infinite; }
        
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans p-4 md:p-8 min-h-screen flex flex-col transition-colors duration-200">

    <div class="max-w-4xl mx-auto w-full bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col h-[85vh] transition-colors duration-200">
        <!-- ヘッダー部分 -->
        <div class="bg-white dark:bg-slate-800 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex flex-col sm:flex-row justify-between items-center gap-4 z-10 transition-colors duration-200">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-100 dark:bg-indigo-900/50 p-2 rounded-lg text-indigo-600 dark:text-indigo-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                </div>
                <h1 class="text-xl font-bold text-slate-800 dark:text-white tracking-tight leading-tight">音声認識による<br>文字起こし（数値のみ）</h1>
            </div>
            
            <div class="flex gap-2 items-center flex-wrap justify-end">
                <!-- テーマ切替ボタン -->
                <button class="p-2.5 rounded-xl text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700 transition-colors mr-1" onclick="toggleTheme()" title="テーマ切替">
                    <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </button>

                <button id="micBtn" class="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-semibold shadow-sm shadow-indigo-200 dark:shadow-none hover:bg-indigo-700 transition-all active:scale-95" onclick="toggleRecognition()">
                    <svg id="micIcon" class="w-5 h-5 text-indigo-100" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8h-2a5 5 0 01-10 0H3a7.001 7.001 0 006 6.93V17H6v2h8v-2h-3v-2.07z" clip-rule="evenodd"></path>
                    </svg>
                    <span id="micText">マイク開始</span>
                </button>
                <div class="h-6 w-px bg-slate-200 dark:bg-slate-700 mx-1 hidden sm:block"></div>
                <button class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 px-4 py-2.5 rounded-xl font-medium shadow-sm transition-all active:scale-95" onclick="copyToClipboard()" title="クリップボードにコピー">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                </button>
                <div class="flex items-center bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-xl p-1 shadow-sm transition-colors">
                    <select id="saveFormat" class="bg-transparent border-none text-slate-700 dark:text-slate-200 py-1.5 px-3 focus:ring-0 focus:outline-none font-medium cursor-pointer text-sm [&>option]:text-slate-800">
                        <option value="csv">CSV</option>
                        <option value="xlsx">Excel</option>
                    </select>
                    <button class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-1.5 rounded-lg font-medium shadow-sm transition-all active:scale-95 flex items-center gap-1" onclick="saveData()">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        保存
                    </button>
                </div>
                <button class="bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 hover:bg-rose-100 dark:hover:bg-rose-900/50 px-3 py-2.5 rounded-xl font-medium transition-all active:scale-95 ml-1" onclick="confirmClearAll()" title="全クリア">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        </div>

        <!-- 状態メッセージ -->
        <div id="statusMsg" class="px-6 py-3 text-sm font-medium text-center text-indigo-700 dark:text-indigo-300 bg-indigo-50 dark:bg-indigo-900/30 border-b border-indigo-100 dark:border-indigo-800/50 flex items-center justify-center gap-2 transition-colors duration-300">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span>マイクボタンを押して入力を開始してください。「〇〇、次へ」で次の行へ。「クリア」で値を消去、「停止」で終了します。</span>
        </div>

        <!-- 入力テーブル -->
        <div class="overflow-x-auto flex-1 bg-slate-50/50 dark:bg-slate-900/50 transition-colors">
            <table class="w-full text-left border-collapse">
                <thead class="bg-white dark:bg-slate-800 sticky top-0 shadow-sm z-0 transition-colors">
                    <tr>
                        <th class="p-4 border-b border-slate-200 dark:border-slate-700 w-20 text-center font-bold text-slate-400 dark:text-slate-500 text-xs uppercase tracking-wider">No.</th>
                        <th class="p-4 border-b border-slate-200 dark:border-slate-700 font-bold text-slate-400 dark:text-slate-500 text-xs uppercase tracking-wider">測定値</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100 dark:divide-slate-700/50">
                    <!-- JavaScriptで生成 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 通知用トースト -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-800 dark:bg-slate-100 text-white dark:text-slate-900 px-6 py-3.5 rounded-xl shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none z-50 flex items-center gap-3 font-medium">
        <svg id="toastIcon" class="w-5 h-5 text-emerald-400 dark:text-emerald-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="toastMsg">メッセージ</span>
    </div>

    <!-- 全クリア確認モーダル -->
    <div id="clearModal" class="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-all duration-300 border border-slate-100 dark:border-slate-700" id="clearModalContent">
            <div class="w-12 h-12 rounded-full bg-rose-100 dark:bg-rose-900/50 flex items-center justify-center mb-4 text-rose-600 dark:text-rose-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h2 class="text-xl font-bold mb-2 text-slate-800 dark:text-white">全データをクリアしますか？</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-6 text-sm">入力された全てのデータが削除され、初期状態に戻ります。この操作は取り消せません。</p>
            <div class="flex justify-end gap-3">
                <button class="px-5 py-2.5 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 font-medium rounded-xl hover:bg-slate-50 dark:hover:bg-slate-600 transition-all active:scale-95" onclick="closeClearModal()">キャンセル</button>
                <button class="px-5 py-2.5 bg-rose-500 text-white font-medium rounded-xl hover:bg-rose-600 shadow-sm shadow-rose-200 dark:shadow-none transition-all active:scale-95" onclick="executeClearAll()">クリアする</button>
            </div>
        </div>
    </div>

    <!-- 手動コピー用モーダル（アイフレーム制限回避用） -->
    <div id="copyModal" class="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 max-w-lg w-full mx-4 shadow-2xl transform scale-95 transition-all duration-300 border border-slate-100 dark:border-slate-700" id="copyModalContent">
            <h2 class="text-xl font-bold mb-2 text-slate-800 dark:text-white">テキストをコピーしてください</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-4 text-sm">ご使用の環境（アイフレーム等）により自動コピーが制限されています。以下のテキストを選択して手動でコピー（Ctrl+C または Cmd+C）してください。</p>
            <textarea id="manualCopyText" class="w-full h-48 px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all mb-4" readonly></textarea>
            <div class="flex justify-end gap-3">
                <button class="px-5 py-2.5 bg-indigo-500 text-white font-medium rounded-xl hover:bg-indigo-600 transition-all active:scale-95" onclick="closeCopyModal()">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        // --- 設定と状態管理 ---
        const INITIAL_ROWS = 10;
        let currentRowCount = 0;
        let currentIndex = 0;
        let isRecognizing = false;
        let recognition;
        let isSpeaking = false; // 読み上げ中に自分の声を拾わないためのフラグ

        // 誤変換対策辞書（現場でよくある誤認識を数字・記号に変換）
        const REPLACE_MAP = {
            'マイナス': '-', '引く': '-',
            '位置': '1', '一': '1', '市': '1', 'イチ': '1',
            '二': '2', '荷': '2', 'ニ': '2',
            '三': '3', '産': '3', 'サン': '3',
            '四': '4', 'シ': '4', 'ヨン': '4',
            '五': '5', '期': '5', 'ゴ': '5',
            '六': '6', 'ロク': '6',
            '七': '7', 'シチ': '7', 'ナナ': '7',
            '八': '8', 'ハチ': '8',
            '九': '9', 'ク': '9', 'キュウ': '9',
            '零': '0', 'ゼロ': '0', 'レイ': '0', 'マル': '0',
            '点': '.', 'テン': '.', '展': '.', '、': '.', '。': '.', '・': '.',
        };

        // --- 初期化処理 ---
        document.addEventListener('DOMContentLoaded', () => {
            updateThemeIcons(document.documentElement.classList.contains('dark'));
            initTable();
            initSpeechRecognition();
            setActiveRow(0);
        });

        // --- テーマ切り替え機能 ---
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons(isDark);
        }

        function updateThemeIcons(isDark) {
            const sunIcon = document.getElementById('sunIcon');
            const moonIcon = document.getElementById('moonIcon');
            if (isDark) {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        // テーブルの生成
        function initTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            currentRowCount = 0;
            for (let i = 0; i < INITIAL_ROWS; i++) {
                addRow();
            }
        }

        // 行の追加
        function addRow() {
            const tbody = document.getElementById('tableBody');
            const i = currentRowCount;
            const tr = document.createElement('tr');
            tr.id = `tr-${i}`;
            tr.className = "bg-white dark:bg-slate-800 transition-colors duration-200 group relative";
            
            tr.innerHTML = `
                <td class="p-3 text-center text-slate-400 dark:text-slate-500 font-mono text-sm border-l-4 border-transparent group-hover:bg-slate-50 dark:group-hover:bg-slate-700/50 transition-colors" id="td-no-${i}">${i + 1}</td>
                <td class="p-2 group-hover:bg-slate-50 dark:group-hover:bg-slate-700/50 transition-colors">
                    <div class="flex items-center gap-2">
                        <input type="number" step="any" id="input-${i}" 
                            class="flex-1 w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-lg font-medium text-slate-800 dark:text-slate-100 placeholder-slate-300 dark:placeholder-slate-600 focus:outline-none focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 dark:focus:border-indigo-400 transition-all shadow-sm"
                            placeholder="値を入力"
                            onfocus="setActiveRow(${i})">
                        <button onclick="clearRow(${i})" class="p-2 text-slate-400 hover:text-rose-500 dark:text-slate-500 dark:hover:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/30 rounded-lg transition-colors focus:outline-none flex-shrink-0" title="この行をクリア">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
            currentRowCount++;
        }

        // アクティブ行のハイライトとフォーカス
        function setActiveRow(index) {
            if (index < 0 || index >= currentRowCount) return;
            
            // 以前のハイライトを解除
            const prevTr = document.getElementById(`tr-${currentIndex}`);
            const prevTdNo = document.getElementById(`td-no-${currentIndex}`);
            if (prevTr) {
                prevTr.classList.remove('bg-indigo-50/50', 'dark:bg-indigo-900/30');
            }
            if (prevTdNo) {
                prevTdNo.classList.remove('border-indigo-500', 'text-indigo-600', 'dark:text-indigo-400', 'font-bold');
                prevTdNo.classList.add('border-transparent', 'text-slate-400', 'dark:text-slate-500');
            }

            currentIndex = index;

            // 新しい行をハイライトしてフォーカス
            const currentTr = document.getElementById(`tr-${currentIndex}`);
            const currentTdNo = document.getElementById(`td-no-${currentIndex}`);
            const currentInput = document.getElementById(`input-${currentIndex}`);
            
            if (currentTr) {
                currentTr.classList.add('bg-indigo-50/50', 'dark:bg-indigo-900/30');
            }
            if (currentTdNo) {
                currentTdNo.classList.remove('border-transparent', 'text-slate-400', 'dark:text-slate-500');
                currentTdNo.classList.add('border-indigo-500', 'text-indigo-600', 'dark:text-indigo-400', 'font-bold');
            }
            if (currentInput && document.activeElement !== currentInput) {
                currentInput.focus();
            }

            // スクロール位置の調整
            currentTr.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // --- 音声認識 (SpeechRecognition) の設定 ---
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showToast("お使いのブラウザは音声認識に非対応です。Chromeをご利用ください。", true);
                document.getElementById('micBtn').disabled = true;
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;
            recognition.interimResults = false; // 確定した結果のみ処理する

            recognition.onstart = () => {
                isRecognizing = true;
                updateMicUI(true);
            };

            recognition.onresult = (event) => {
                // 読み上げ中は自身の音声を拾わないように無視する
                if (isSpeaking) return;

                const resultIndex = event.resultIndex;
                const transcript = event.results[resultIndex][0].transcript;
                console.log("認識結果:", transcript);
                
                processTranscript(transcript);
            };

            // 【ご相談ポイント】 onendでの再起動処理
            recognition.onend = () => {
                // ユーザーが手動で停止していない場合は、自動的に再起動する
                if (isRecognizing) {
                    console.log("認識が途切れたため、再起動します...");
                    try {
                        recognition.start();
                    } catch (e) {
                        console.error("再起動エラー:", e);
                    }
                } else {
                    updateMicUI(false);
                }
            };

            recognition.onerror = (event) => {
                console.warn("音声認識エラー:", event.error);
                // エラー時も、致命的なもの以外は onend が呼ばれて自動再起動されることが多い
                if (event.error === 'not-allowed') {
                    isRecognizing = false;
                    showToast("マイクのアクセスが拒否されました。", true);
                }
            };
        }

        // 認識結果の処理
        function processTranscript(text) {
            let processedText = text;

            // 1. コマンドの検知
            const isNextCommand = processedText.includes('次') || processedText.includes('つぎ');
            const isClearCommand = processedText.includes('消す') || processedText.includes('クリア');
            const isStopCommand = processedText.includes('停止') || processedText.includes('完了');
            
            // 停止コマンド処理
            if (isStopCommand) {
                speakText("マイクを停止します");
                isRecognizing = false;
                recognition.stop();
                updateMicUI(false);
                return; // 以降の処理はスキップ
            }

            // クリアコマンド処理
            if (isClearCommand) {
                const inputEl = document.getElementById(`input-${currentIndex}`);
                inputEl.value = '';
                speakText("クリアしました");
                // 視覚的フィードバック（黄色く光らせる）
                inputEl.classList.add('bg-amber-50', 'dark:bg-amber-900/30', 'ring-2', 'ring-amber-400', 'border-amber-400', 'dark:ring-amber-500/50', 'dark:border-amber-500/50');
                setTimeout(() => inputEl.classList.remove('bg-amber-50', 'dark:bg-amber-900/30', 'ring-2', 'ring-amber-400', 'border-amber-400', 'dark:ring-amber-500/50', 'dark:border-amber-500/50'), 600);
                return; // 以降の処理はスキップ
            }

            // 2. 誤変換の置換（辞書ベース）
            for (const [key, value] of Object.entries(REPLACE_MAP)) {
                // グローバル置換
                processedText = processedText.split(key).join(value);
            }

            // 3. 数値の抽出 (例: "12.5" や "-100")
            const numberMatch = processedText.match(/-?[0-9]+\.?[0-9]*/);

            let valueEntered = false;
            let extractedNumber = "";

            if (numberMatch) {
                extractedNumber = numberMatch[0];
                const inputEl = document.getElementById(`input-${currentIndex}`);
                inputEl.value = extractedNumber;
                valueEntered = true;
                
                // 入力フィードバック（視覚と音声）
                inputEl.classList.add('bg-emerald-50', 'dark:bg-emerald-900/30', 'ring-2', 'ring-emerald-400', 'border-emerald-400', 'dark:ring-emerald-500/50', 'dark:border-emerald-500/50');
                setTimeout(() => inputEl.classList.remove('bg-emerald-50', 'dark:bg-emerald-900/30', 'ring-2', 'ring-emerald-400', 'border-emerald-400', 'dark:ring-emerald-500/50', 'dark:border-emerald-500/50'), 600);
                
                speakText(extractedNumber);
            }

            // 4. 次へ移動
            if (isNextCommand) {
                if (!valueEntered) {
                    // 数値は認識できなかったが「次へ」と言われた場合
                    speakText("次へ");
                }
                setTimeout(() => {
                    // 最後の行に到達した場合は新しい行を自動追加する
                    if (currentIndex === currentRowCount - 1) {
                        addRow();
                    }
                    setActiveRow(currentIndex + 1);
                }, 300); // 読み上げと重ならないよう少し遅延
            }
        }

        // --- 音声合成 (SpeechSynthesis) の設定 ---
        function speakText(text) {
            if (!window.speechSynthesis) return;
            
            // 既存の読み上げをキャンセル
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = 1.2; // 少し早めに読み上げる
            
            utterance.onstart = () => { isSpeaking = true; };
            utterance.onend = () => { isSpeaking = false; };
            utterance.onerror = () => { isSpeaking = false; };

            window.speechSynthesis.speak(utterance);
        }

        // --- UI制御 ---
        function toggleRecognition() {
            if (!recognition) return;

            if (isRecognizing) {
                isRecognizing = false; // フラグを先に折ることでonendでの再起動を防ぐ
                recognition.stop();
            } else {
                try {
                    recognition.start();
                } catch (e) {
                    console.error(e);
                }
            }
        }

        function updateMicUI(active) {
            const btn = document.getElementById('micBtn');
            const icon = document.getElementById('micIcon');
            const text = document.getElementById('micText');
            const msg = document.getElementById('statusMsg');

            if (active) {
                btn.classList.replace('bg-indigo-600', 'bg-rose-500');
                btn.classList.replace('hover:bg-indigo-700', 'hover:bg-rose-600');
                btn.classList.replace('shadow-indigo-200', 'shadow-rose-200');
                btn.classList.add('mic-active');
                icon.classList.replace('text-indigo-100', 'text-white');
                text.innerText = '停止する';
                msg.classList.replace('bg-indigo-50', 'bg-rose-50');
                msg.classList.replace('text-indigo-700', 'text-rose-700');
                msg.classList.replace('border-indigo-100', 'border-rose-100');
                msg.classList.replace('dark:bg-indigo-900/30', 'dark:bg-rose-900/30');
                msg.classList.replace('dark:text-indigo-300', 'dark:text-rose-300');
                msg.classList.replace('dark:border-indigo-800/50', 'dark:border-rose-800/50');
                msg.innerHTML = '<span class="flex h-2.5 w-2.5 relative mr-1"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-rose-500"></span></span> <span class="font-bold">音声認識中...</span> 発話してください。（例：「次へ」「クリア」「停止」）';
            } else {
                btn.classList.replace('bg-rose-500', 'bg-indigo-600');
                btn.classList.replace('hover:bg-rose-600', 'hover:bg-indigo-700');
                btn.classList.replace('shadow-rose-200', 'shadow-indigo-200');
                btn.classList.remove('mic-active');
                icon.classList.replace('text-white', 'text-indigo-100');
                text.innerText = 'マイク開始';
                msg.classList.replace('bg-rose-50', 'bg-indigo-50');
                msg.classList.replace('text-rose-700', 'text-indigo-700');
                msg.classList.replace('border-rose-100', 'border-indigo-100');
                msg.classList.replace('dark:bg-rose-900/30', 'dark:bg-indigo-900/30');
                msg.classList.replace('dark:text-rose-300', 'dark:text-indigo-300');
                msg.classList.replace('dark:border-rose-800/50', 'dark:border-indigo-800/50');
                msg.innerHTML = '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> <span>マイクボタンを押して入力を開始してください。「〇〇、次へ」で次の行へ。「クリア」で値を消去、「停止」で終了します。</span>';
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const toastIcon = document.getElementById('toastIcon');

            if (toastMsg) toastMsg.innerText = message;
            
            if (isError) {
                // エラー用の警告アイコン（赤色）
                toastIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
                toastIcon.className = 'w-5 h-5 text-rose-500 dark:text-rose-500 flex-shrink-0';
            } else {
                // 成功用のチェックアイコン（緑色）
                toastIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
                toastIcon.className = 'w-5 h-5 text-emerald-400 dark:text-emerald-500 flex-shrink-0';
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // --- 全クリア処理 ---
        function confirmClearAll() {
            const modal = document.getElementById('clearModal');
            const modalContent = document.getElementById('clearModalContent');
            modal.classList.remove('hidden');
            // 少し遅らせてopacityを変更し、トランジションを効かせる
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        function closeClearModal() {
            const modal = document.getElementById('clearModal');
            const modalContent = document.getElementById('clearModalContent');
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function executeClearAll() {
            closeClearModal();
            initTable();
            setActiveRow(0);
            showToast("シートを全てクリアしました");
            speakText("全クリアしました");
        }

        // --- 個別行のクリア処理 ---
        function clearRow(index) {
            const inputEl = document.getElementById(`input-${index}`);
            if (inputEl) {
                inputEl.value = '';
                // 視覚的フィードバック（黄色く光らせる）
                inputEl.classList.add('bg-amber-50', 'dark:bg-amber-900/30', 'ring-2', 'ring-amber-400', 'border-amber-400', 'dark:ring-amber-500/50', 'dark:border-amber-500/50');
                setTimeout(() => inputEl.classList.remove('bg-amber-50', 'dark:bg-amber-900/30', 'ring-2', 'ring-amber-400', 'border-amber-400', 'dark:ring-amber-500/50', 'dark:border-amber-500/50'), 600);
                
                // クリアした行をアクティブにする
                setActiveRow(index);
            }
        }

        // --- クリップボードへのコピー処理 ---
        function copyToClipboard() {
            // スプレッドシート等に貼り付けやすいようタブ区切り(TSV)文字列を作成
            let text = "No.\t測定値\n";
            for (let i = 0; i < currentRowCount; i++) {
                const val = document.getElementById(`input-${i}`).value;
                text += `${i + 1}\t${val}\n`;
            }

            // 確実なコピー実行のため、見えないテキストエリアを作成して選択状態にする
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            
            let successful = false;
            try {
                successful = document.execCommand('copy');
            } catch (err) {
                successful = false;
            }
            
            // 使用したテキストエリアを削除
            document.body.removeChild(textarea);

            if (successful) {
                showToast("クリップボードに表データをコピーしました");
            } else {
                // アイフレーム等で自動コピーがブロックされた場合は手動コピー用モーダルを表示
                showManualCopyModal(text);
            }
        }

        function showManualCopyModal(text) {
            const modal = document.getElementById('copyModal');
            const modalContent = document.getElementById('copyModalContent');
            const textArea = document.getElementById('manualCopyText');
            
            textArea.value = text;
            modal.classList.remove('hidden');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                textArea.select();
            }, 10);
        }

        function closeCopyModal() {
            const modal = document.getElementById('copyModal');
            const modalContent = document.getElementById('copyModalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // --- データ保存（ダウンロード）処理 ---
        function saveData() {
            const format = document.getElementById('saveFormat').value;
            const data = [['No.', '測定値']]; // ヘッダー行

            // 現在の行数分だけデータを取得
            for (let i = 0; i < currentRowCount; i++) {
                const val = document.getElementById(`input-${i}`).value;
                data.push([i + 1, val]);
            }

            // タイムスタンプ生成 (YYYYMMDD_hhmmss)
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const timestamp = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
            // ★変更箇所：「GAS_Speech_」から「HTML_Speech_」へ変更しました
            const filename = `HTML_Speech_${timestamp}`;

            // SheetJSを使用してワークブックを作成
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");

            // ファイル形式に応じてダウンロード
            if (format === 'csv') {
                XLSX.writeFile(wb, `${filename}.csv`);
            } else {
                XLSX.writeFile(wb, `${filename}.xlsx`);
            }

            showToast(`${filename}.${format} をダウンロードしました！`);
        }
    </script>
